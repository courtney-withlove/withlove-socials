<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>With Love Socials</title>

<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --ivory:#F6F4F1;
  --taupe:#C7C1B8;
  --mocha:#9C8F84;
  --charcoal:#2F2F2F;
  --sage:#ADBAB7;

  --radius-lg:22px;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Public Sans',sans-serif;
  background:var(--ivory);
  color:var(--charcoal);
}

/* GLOBAL IMAGE FIX */
img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* CONTAINER */
.container{
  max-width:1120px;
  margin:0 auto;
  padding:0 28px;
}

/* NAV */
#navbar{
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
}

.nav-inner{
  max-width:1120px;
  margin:auto;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 28px;
}

.logo-text{
  font-family:'PT Serif',serif;
  font-weight:700;
  color:white;
}

.nav-links{
  display:flex;
  gap:24px;
  list-style:none;
}

.nav-links a{
  color:white;
  font-size:14px;
}

/* HERO */
#hero{
  background:var(--charcoal);
  min-height:100vh;
  display:flex;
  align-items:center;
}

.hero-inner{
  padding-top:120px;
  padding-bottom:80px;
}

.hero-content{
  max-width:640px;
  padding-left:24px;
}

.hero-headline{
  font-family:'PT Serif',serif;
  font-size:clamp(2.5rem,5vw,4.5rem);
  color:var(--ivory);
  line-height:1.1;
  margin-bottom:20px;
}

.hero-sub{
  color:rgba(255,255,255,0.7);
  margin-bottom:30px;
  line-height:1.7;
}

.btn{
  padding:14px 26px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{
  background:var(--sage);
}

/* FOUNDER IMAGE FIX */
.founder-photo{
  width:100%;
  aspect-ratio:3/4;
  border-radius:var(--radius-lg);
  overflow:hidden;
  background-size:cover;
  background-position:center;
}

/* SECTION */
.section{
  padding:80px 0;
}

/* SIMPLE GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

/* MOBILE */
@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }

  .hero-content{
    padding-left:0;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav id="navbar">
  <div class="nav-inner">
    <div class="logo-text">WITH LOVE SOCIALS</div>
    <ul class="nav-links">
      <li><a href="#">Services</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Results</a></li>
    </ul>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="container hero-inner">
    <div class="hero-content">
      <h1 class="hero-headline">
        Your Instagram should bring in clients.
      </h1>

      <p class="hero-sub">
        We manage your Instagram so your content actually converts into bookings.
      </p>

      <button class="btn btn-primary">
        Get Free Audit
      </button>
    </div>
  </div>
</section>

<!-- ABOUT -->
<section class="section">
  <div class="container grid">

    <div class="founder-photo" style="background-image:url('https://via.placeholder.com/600x800');"></div>

    <div>
      <h2 style="font-family:'PT Serif'; font-size:32px; margin-bottom:16px;">
        Hi, I'm Courtney.
      </h2>

      <p style="line-height:1.7;">
        I help brands turn Instagram into a client acquisition machine.
      </p>
    </div>

  </div>
</section>

</body>
</html>
